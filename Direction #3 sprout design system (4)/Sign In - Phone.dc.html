<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  @keyframes stspin{to{transform:rotate(360deg);}}
  @keyframes stfade{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
</style>
</helmet>

<div style="background:#E7E6E4;min-height:100vh;padding:48px 24px 64px;font-family:'Varela Round',sans-serif;display:flex;flex-direction:column;align-items:center;gap:18px;min-width:fit-content;">

  <div style="text-align:center;">
    <div style="font-family:'Rubik',sans-serif;font-size:20px;font-weight:600;color:#3A2A4D;">Sign in · ScreenTime phone app</div>
    <div style="font-size:13px;color:#8A7C96;">Android · Material 3 · Sprout</div>
  </div>

  <x-import component="AndroidDevice" from="./android-frame.jsx" dark="{{ false }}" hint-size="412px,892px">

    <div style="height:100%;display:flex;flex-direction:column;background:#FCF6F0;font-family:'Varela Round',sans-serif;color:#3A2A4D;">

      <!-- hero -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px 8px;text-align:center;gap:0;">
        <!-- app icon -->
        <div style="width:96px;height:96px;border-radius:24px;background:#FF6B5E;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(255,107,94,.34),0 2px 6px rgba(255,107,94,.18);margin-bottom:26px;">
          <div style="width:40px;height:40px;border-radius:99px;background:#3A2A4D;"></div>
        </div>
        <!-- headline -->
        <h1 style="font-family:'Rubik',sans-serif;font-size:34px;font-weight:600;margin:0;line-height:1.1;">Welcome to ScreenTime</h1>
        <!-- subtitle -->
        <p style="font-size:16px;font-weight:600;color:#8A7C96;margin:10px 0 0;line-height:1.5;max-width:300px;">Sign in to manage your family's screen time</p>
      </div>

      <!-- buttons -->
      <div style="padding:0 16px;display:flex;flex-direction:column;gap:12px;">

        <!-- Google button -->
        <div onClick="{{ onGoogle }}" style="{{ googleStyle }}">
          <sc-if value="{{ loading }}">
            <div style="width:22px;height:22px;border-radius:99px;border:3px solid rgba(58,42,77,.25);border-top-color:#3A2A4D;animation:stspin .7s linear infinite;"></div>
          </sc-if>
          <sc-if value="{{ notLoading }}">
            <div style="width:28px;height:28px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'Varela Round',sans-serif;font-size:17px;font-weight:900;color:#4285F4;flex-shrink:0;">G</div>
          </sc-if>
          <span style="font-size:15px;font-weight:800;">{{ googleLabel }}</span>
        </div>

        <!-- Email button -->
        <div onClick="{{ onEmail }}" style="display:flex;align-items:center;justify-content:center;gap:10px;background:transparent;border:1.5px solid #EADFD4;border-radius:99px;padding:14px 20px;cursor:pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8A7C96" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M3 8l9 6 9-6"/></svg>
          <span style="font-size:15px;font-weight:800;color:#3A2A4D;">Sign in with email</span>
        </div>

        <!-- Email expand -->
        <sc-if value="{{ emailOpen }}">
          <div style="display:flex;flex-direction:column;gap:10px;animation:stfade .2s ease-out;">
            <div style="background:#fff;border:1.5px solid #EADFD4;border-radius:18px;padding:0 16px;display:flex;align-items:center;gap:10px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B6ABBF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M3 8l9 6 9-6"/></svg>
              <input type="email" placeholder="your@email.com" style="flex:1;border:none;outline:none;font-family:'Varela Round',sans-serif;font-size:15px;font-weight:600;color:#3A2A4D;background:transparent;padding:14px 0;" />
            </div>
            <div style="display:flex;align-items:center;justify-content:center;background:#FF6B5E;border-radius:99px;padding:14px 0;cursor:pointer;box-shadow:0 6px 16px rgba(255,107,94,.28);">
              <span style="font-size:15px;font-weight:800;color:#3A2A4D;">Continue</span>
            </div>
          </div>
        </sc-if>

      </div>

      <!-- footer -->
      <div style="padding:20px 24px 20px;text-align:center;">
        <p style="font-size:12px;font-weight:600;color:#B6ABBF;margin:0;line-height:1.6;">
          By continuing you agree to our
          <span style="color:#8A7C96;text-decoration:underline;cursor:pointer;">Privacy Policy</span>
          and
          <span style="color:#8A7C96;text-decoration:underline;cursor:pointer;">Terms of Service</span>
        </p>
      </div>

    </div>

  </x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:620}}">
class Component extends DCLogic {
  state = { loading: false, emailOpen: false };

  componentWillUnmount(){ clearTimeout(this._t); }

  signInGoogle(){
    if(this.state.loading) return;
    this.setState({ loading: true });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ loading: false }), 1600);
  }

  toggleEmail(){
    this.setState(s => ({ emailOpen: !s.emailOpen }));
  }

  renderVals(){
    const { loading, emailOpen } = this.state;
    const googleBase = "display:flex;align-items:center;justify-content:center;gap:12px;border-radius:99px;padding:14px 20px;cursor:pointer;transition:opacity .15s;";
    const googleStyle = googleBase
      + (loading
        ? "background:#F0584B;opacity:.75;pointer-events:none;"
        : "background:#FF6B5E;box-shadow:0 8px 20px rgba(255,107,94,.32);");
    return {
      loading,
      notLoading: !loading,
      emailOpen,
      googleLabel: loading ? "Connecting…" : "Continue with Google",
      googleStyle,
      onGoogle: () => this.signInGoogle(),
      onEmail: () => this.toggleEmail(),
    };
  }
}
</script>
</body>
</html>
