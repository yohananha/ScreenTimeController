name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  android-ui-mobile:
    name: Compose UI tests (mobile, API 34)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: AVD cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-mobile
      - name: Provide dummy google-services.json
        run: |
          for d in mobile tv; do
            cp .github/workflows/google-services.stub.json "$d/google-services.json" || true
          done
      - name: Run mobile androidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          script: ./gradlew :mobile:connectedDebugAndroidTest

  android-ui-tv:
    name: Compose UI tests (TV, API 34)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: AVD cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-tv
      - name: Provide dummy google-services.json
        run: |
          for d in mobile tv; do
            cp .github/workflows/google-services.stub.json "$d/google-services.json" || true
          done
      - name: Run tv androidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: tv_1080p
          target: google_apis
          script: ./gradlew :tv:connectedDebugAndroidTest
