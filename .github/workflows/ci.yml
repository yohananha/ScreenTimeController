name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-jvm:
    name: Android JVM tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Provide dummy google-services.json
        run: |
          for d in mobile tv; do
            if [ ! -f "$d/google-services.json" ]; then
              cp .github/workflows/google-services.stub.json "$d/google-services.json" || true
            fi
          done
      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest
      - name: Kover XML + verify 80%
        run: ./gradlew --no-daemon koverXmlReport koverVerify
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-xml
          path: "**/build/reports/kover/report.xml"
      - name: Upload to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./build/reports/kover/report.xml
          flags: android

  functions:
    name: Cloud Functions tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-coverage
          path: functions/coverage

  rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci || npm install
      - run: npm run test:rules

  lint:
    name: Android lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Provide dummy google-services.json
        run: |
          for d in mobile tv; do
            if [ ! -f "$d/google-services.json" ]; then
              cp .github/workflows/google-services.stub.json "$d/google-services.json" || true
            fi
          done
      - run: ./gradlew --no-daemon lintDebug
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.html"
